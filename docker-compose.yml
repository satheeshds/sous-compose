# Docker Compose file for running paperless from the Docker Hub.
# This file contains everything paperless needs to run.
# Paperless supports amd64, arm and arm64 hardware.
#
# All compose files of paperless configure paperless in the following way:
#
# - Paperless is (re)started on system boot, if it was running before shutdown.
# - Docker volumes for storing data are managed by Docker.
# - Folders for importing and exporting files are created in the same directory
#   as this file and mounted to the correct folders inside the container.
# - Paperless listens on port 8000.
#
# In addition to that, this Docker Compose file adds the following optional
# configurations:
#
# - Instead of SQLite (default), PostgreSQL is used as the database server.
#
# To install and update paperless with this file, do the following:
#
# - Copy this file as 'docker-compose.yml' and the files 'docker-compose.env'
#   and '.env' into a folder.
# - Run 'docker compose pull'.
# - Run 'docker compose up -d'.
#
# For more extensive installation and update instructions, refer to the
# documentation.
services:
  broker:
    image: docker.io/library/redis:8
    profiles: ["paperless"]
    restart: unless-stopped
    volumes:
      - redisdata:/data
  db:
    image: docker.io/library/postgres:18
    profiles: ["paperless"]
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    profiles: ["paperless"]
    restart: unless-stopped
    depends_on:
      - db
      - broker
    ports:
      - "8000:8000"
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      # - ./consume:/usr/src/paperless/consume
      # - ./scripts:/usr/src/paperless/scripts/
    env_file: docker-compose.env
    environment:
      PAPERLESS_URL: http://webserver:8000
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBHOST: db
      # PAPERLESS_POST_CONSUME_SCRIPT: /usr/src/paperless/scripts/post-consumption.sh
      # PAPERLESS_FILENAME_FORMAT: "{{ created_year }}/{{ created_month }}/invoice_{{ created_day }}"
      PAPERLESS_OAUTH_CALLBACK_BASE_URL: "http://localhost:8000"
      PAPERLESS_GMAIL_OAUTH_CLIENT_ID: ${PAPERLESS_GMAIL_OAUTH_CLIENT_ID}
      PAPERLESS_GMAIL_OAUTH_CLIENT_SECRET: ${PAPERLESS_GMAIL_OAUTH_CLIENT_SECRET}
      PAPERLESS_ENABLE_HTTP_REMOTE_USER: true
      PAPERLESS_ENABLE_HTTP_REMOTE_USER_API: true
      PAPERLESS_CSRF_TRUSTED_ORIGINS: "http://localhost:8000"
      GMAIL_OAUTH_ENABLED: true
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  tika:
    image: docker.io/apache/tika:latest
    profiles: ["paperless"]
    restart: unless-stopped
    ports:
      - "9998:9998"

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.25
    profiles: ["paperless"]
    restart: unless-stopped
    # The gotenberg chromium route is used to convert .eml files. We do not
    # want to allow external content like tracking pixels or even javascript.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  docai-lifecycle:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
    profiles: ["processing"]
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /config/service-account.json
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us}
      DOC_AI_PROCESSOR_IDS: ${DOCUMENT_AI_PROCESSOR_ID},${BANK_STATEMENT_PROCESSOR_ID}
    volumes:
      - ./document-processor-config/service-account.json:/config/service-account.json:ro
    command: >
      /bin/sh -c "trap 'exit 0' TERM INT; while :; do sleep 3600; done"
    post_start:
      - command: >
          /bin/sh -lc '
          gcloud auth activate-service-account --key-file="$$GOOGLE_APPLICATION_CREDENTIALS" --quiet;
          ACCESS_TOKEN="$$(gcloud auth print-access-token)";
          for ID in $$(echo "$$DOC_AI_PROCESSOR_IDS" | tr "," " "); do
            [ -n "$$ID" ] || continue;
            STATE=$$(curl -fsS -H "Authorization: Bearer $$ACCESS_TOKEN" \
              "https://$${GOOGLE_CLOUD_LOCATION}-documentai.googleapis.com/v1/projects/$${GOOGLE_CLOUD_PROJECT}/locations/$${GOOGLE_CLOUD_LOCATION}/processors/$$ID" \
              | sed -n "s/.*\"state\": *\"\([^\"]*\)\".*/\1/p" | head -n 1);
            if [ "$$STATE" != "ENABLED" ]; then
              echo "Enabling Doc AI processor $$ID";
              curl -fsS -X POST -H "Authorization: Bearer $$ACCESS_TOKEN" \
                "https://$${GOOGLE_CLOUD_LOCATION}-documentai.googleapis.com/v1/projects/$${GOOGLE_CLOUD_PROJECT}/locations/$${GOOGLE_CLOUD_LOCATION}/processors/$$ID:enable";
            fi;
          done;
          touch /tmp/docai-enabled
          '
    pre_stop:
      - command: >
          /bin/sh -lc '
          gcloud auth activate-service-account --key-file="$$GOOGLE_APPLICATION_CREDENTIALS" --quiet;
          ACCESS_TOKEN="$$(gcloud auth print-access-token)";
          for ID in $$(echo "$$DOC_AI_PROCESSOR_IDS" | tr "," " "); do
            [ -n "$$ID" ] || continue;
            STATE=$$(curl -fsS -H "Authorization: Bearer $$ACCESS_TOKEN" \
              "https://$${GOOGLE_CLOUD_LOCATION}-documentai.googleapis.com/v1/projects/$${GOOGLE_CLOUD_PROJECT}/locations/$${GOOGLE_CLOUD_LOCATION}/processors/$$ID" \
              | sed -n "s/.*\"state\": *\"\([^\"]*\)\".*/\1/p" | head -n 1);
            if [ "$$STATE" != "DISABLED" ]; then
              echo "Disabling Doc AI processor $$ID";
              curl -fsS -X POST -H "Authorization: Bearer $$ACCESS_TOKEN" \
                "https://$${GOOGLE_CLOUD_LOCATION}-documentai.googleapis.com/v1/projects/$${GOOGLE_CLOUD_PROJECT}/locations/$${GOOGLE_CLOUD_LOCATION}/processors/$$ID:disable";
            fi;
          done
          '
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/docai-enabled"]
      interval: 5s
      timeout: 5s
      retries: 12

  document-processor:
    image: satheeshds/paperless-document-processor:latest
    profiles: ["processing"]
    restart: unless-stopped
    depends_on:
      webserver:
        condition: service_healthy
      docai-lifecycle:
        condition: service_healthy
    ports:
     - "8070:80"
    environment:
      PORT: 80
      LOG_LEVEL: debug
      DB_PATH: /app/data/duck.db
      # Pass these from .env file or host environment
      PAPERLESS_URL: "http://webserver:8000"
      PAPERLESS_USERNAME: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: 'us'
      DOCUMENT_AI_PROCESSOR_ID: ${DOCUMENT_AI_PROCESSOR_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /app/config/service-account.json
      ACCOUNTING_URL: "http://accounting"
      TIKA_URL: http://tika:9998
      PAYOUT_EXCEL_DUCKDB_CONFIG_PATH: /app/config/payout-configs.json
      BANK_STATEMENT_PROCESSOR_ID: ${BANK_STATEMENT_PROCESSOR_ID}
      LIBREOFFICE_URL: http://libreoffice-parser:8000
      LIBREOFFICE_DATA_PATH: /data

    volumes:
      - ./data:/app/data
      - media:/app/media:ro
      - ./document-processor-config:/app/config:ro

  portal:
    image: satheeshds/portal:latest
    restart: unless-stopped
    profiles: ["platform"]
    # depends_on:
    #   webserver:
    #     condition: service_healthy
    ports:
      - "8090:80"
    environment:
      LOG_LEVEL: debug
      NEXUS_HOST: nexus-gateway
      NEXUS_PORT: 5433
      NEXUS_USER: portal
      NEXUS_PASSWORD: ${NEXUS_PASSWORD}
      NEXUS_DATABASE: lake
      NEXUS_CONTROL_URL: http://nexus-control:8080
      ADMIN_API_KEY: ${ADMIN_API_KEY}
  
  platform:
    image: satheeshds/platform:latest
    profiles: ["platform"]
    environment:
      NEXUS_HOST: nexus-gateway
      NEXUS_PORT: 5433
      NEXUS_CONTROL_URL: http://nexus-control:8080
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      LOG_LEVEL: debug
    restart: unless-stopped
    depends_on:
      - nexus-gateway
      - nexus-control

  libreoffice-parser:
    image: libreoffice-parser:latest
    profiles: ["processing"]
    restart: unless-stopped
    # depends_on:
    #   webserver:
    #     condition: service_healthy
    volumes:
      - media:/data:ro
    ports:
      - "8091:8000"

    # ── Metadata Catalog ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: ["nexus"]
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lake_catalog}
      POSTGRES_USER:     ${NEXUS_POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${NEXUS_POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEXUS_POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-lake_catalog}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Object Storage ───────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    profiles: ["nexus"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Bootstrap MinIO bucket ───────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    profiles: ["nexus"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      LAKEHOUSE_BUCKET:    ${LAKEHOUSE_BUCKET:-lakehouse}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      /usr/bin/mc mb myminio/$${LAKEHOUSE_BUCKET} --ignore-existing;
      echo 'MinIO bucket ready';
      exit 0;
      "

  # ── Nexus Control Plane ──────────────────────────────────────────────────────
  nexus-control:
    image: nexus-control:latest
    profiles: ["nexus"]
    # build:
      # context: .
      # dockerfile: deploy/Dockerfile.control
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      NEXUS_POSTGRES_HOST:     postgres
      NEXUS_POSTGRES_PORT:     5432
      NEXUS_POSTGRES_USER:     ${NEXUS_POSTGRES_USER:-nexus}
      NEXUS_POSTGRES_PASSWORD: ${NEXUS_POSTGRES_PASSWORD:-changeme}
      NEXUS_POSTGRES_DBNAME:   ${POSTGRES_DB:-lake_catalog}
      NEXUS_MINIO_ENDPOINT:    minio:9000
      NEXUS_MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER:-minioadmin}
      NEXUS_MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD:-changeme}
      NEXUS_MINIO_BUCKET:      ${LAKEHOUSE_BUCKET:-lakehouse}
      NEXUS_AUTH_JWT_SECRET:   ${JWT_SECRET:-supersecretkey_change_in_production}
      NEXUS_AUTH_ADMIN_API_KEY: ${ADMIN_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nexus Query Gateway (pgwire) ─────────────────────────────────────────────
  nexus-gateway:
    image: nexus-gateway:latest
    profiles: ["nexus"]
    # build:
      # context: .
      # dockerfile: deploy/Dockerfile.gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nexus-control:
        condition: service_healthy
    ports:
      - "5433:5433"   # Postgres-wire query endpoint
    environment:
      NEXUS_POSTGRES_HOST:     postgres
      NEXUS_POSTGRES_PORT:     5432
      NEXUS_POSTGRES_USER:     ${NEXUS_POSTGRES_USER:-nexus}
      NEXUS_POSTGRES_PASSWORD: ${NEXUS_POSTGRES_PASSWORD:-changeme}
      NEXUS_POSTGRES_DBNAME:   ${POSTGRES_DB:-lake_catalog}
      NEXUS_MINIO_ENDPOINT:    minio:9000
      NEXUS_MINIO_ACCESS_KEY:  ${MINIO_ROOT_USER:-minioadmin}
      NEXUS_MINIO_SECRET_KEY:  ${MINIO_ROOT_PASSWORD:-changeme}
      NEXUS_MINIO_BUCKET:      ${LAKEHOUSE_BUCKET:-lakehouse}
      NEXUS_AUTH_JWT_SECRET:   ${JWT_SECRET:-supersecretkey_change_in_production}
      NEXUS_GATEWAY_PORT:      5433
      LOG_LEVEL:               debug

volumes:
  postgres_data:
  minio_data:
  data:
  media:
  pgdata:
  redisdata:
